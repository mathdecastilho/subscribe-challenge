name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  rspec:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install dependencies
        run: bundle install

      - name: Run tests
        run: bundle exec rspec
